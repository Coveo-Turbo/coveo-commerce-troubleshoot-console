<section class="troubleshoot-root" aria-live="polite">
  <header class="tc-panel" data-role="top-panel">
    <div class="tc-panel__header">
      <h1>Commerce Troubleshoot Console</h1>
      <button
        type="button"
        data-action="toggle-panel"
        class="icon-button"
        aria-expanded="true"
        title="Minimize controls"
      >
        <span aria-hidden="true">▾</span>
      </button>
    </div>

    <div class="tc-panel__controls" data-role="top-panel-controls">
      <label class="field">
        <span>Tracking ID</span>
        <select data-control="tracking"></select>
      </label>

      <label class="field">
        <span>Locale</span>
        <select data-control="locale"></select>
      </label>

      <div class="field">
        <span>Mode</span>
        <div class="mode-switch" role="tablist" aria-label="Execution mode">
          <button type="button" class="mode-button active" data-mode="search" role="tab" aria-selected="true">
            Search
          </button>
          <button type="button" class="mode-button" data-mode="listing" role="tab" aria-selected="false">
            Listing
          </button>
        </div>
      </div>

      <label class="field">
        <span>Search Query</span>
        <input type="text" data-control="query" placeholder="Optional query text" />
      </label>

      <label class="field">
        <span>Listing Filter</span>
        <input type="text" data-control="listing-filter" placeholder="Filter by label, ID, or URL" />
      </label>

      <label class="field">
        <span>Listing</span>
        <select data-control="listing"></select>
      </label>

      <label class="field">
        <span>Context Preset</span>
        <select data-control="preset"></select>
      </label>

      <div class="field field-actions">
        <span>Advanced Context</span>
        <div class="button-row">
          <button type="button" data-action="open-advanced">Edit JSON</button>
          <button type="button" data-action="open-presets">Manage Presets</button>
          <button type="button" data-action="run-request">Run</button>
          <button type="button" data-action="reset-state" class="danger">Reset</button>
        </div>
      </div>
    </div>
  </header>

  <section class="tc-session" data-role="session-panel">
    <h2>Session Summary</h2>
    <div class="pills">
      <span class="pill" data-field="mode-pill">Mode: search</span>
      <span class="pill" data-field="tracking-pill"></span>
      <span class="pill" data-field="locale-pill"></span>
      <span class="pill" data-field="listing-pill"></span>
    </div>

    <div class="session-grid">
      <div class="session-row" data-field="search-row">
        <span>Search URL</span>
        <code data-field="search-url"></code>
      </div>
      <div class="session-row" data-field="listing-row" hidden>
        <span>Listing URL</span>
        <code data-field="listing-url"></code>
      </div>
    </div>

    <p class="status-line" data-field="status">Idle</p>
    <pre class="result-panel" data-field="result">Run a request to inspect payload/response.</pre>
  </section>

  <dialog class="tc-modal" data-modal="advanced-context">
    <form method="dialog" class="modal-form">
      <header>
        <h3>Advanced Context</h3>
        <p>Provide JSON objects. Invalid JSON blocks apply.</p>
      </header>

      <label class="field">
        <span>custom</span>
        <textarea data-field="custom-context" rows="8" spellcheck="false"></textarea>
      </label>

      <label class="field">
        <span>dictionaryFieldContext</span>
        <textarea data-field="dictionary-context" rows="8" spellcheck="false"></textarea>
      </label>

      <p class="error" data-field="advanced-error" hidden></p>

      <div class="button-row modal-actions">
        <button value="cancel">Cancel</button>
        <button type="button" data-action="apply-advanced">Apply</button>
      </div>
    </form>
  </dialog>

  <dialog class="tc-modal" data-modal="manage-presets">
    <form method="dialog" class="modal-form">
      <header>
        <h3>Manage Context Presets</h3>
      </header>

      <ul class="preset-list" data-role="preset-list"></ul>

      <div class="button-row modal-actions">
        <button type="button" data-action="add-preset">Add from current context</button>
        <button value="close">Close</button>
      </div>
    </form>
  </dialog>
</section>
