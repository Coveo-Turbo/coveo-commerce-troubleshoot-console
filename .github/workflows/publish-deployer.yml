name: Publish Deployer Package

on:
  push:
    branches:
      - main
    paths:
      - "packages/commerce-troubleshoot-deployer/**"
      - ".github/workflows/publish-deployer.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-deployer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Force npmjs registry for @coveops scope
        run: npm config set @coveops:registry https://registry.npmjs.org/

      - name: Build deployer package
        run: npm run build --workspace @coveops/commerce-troubleshoot-deployer

      - name: Check npm for existing version
        id: npm_check
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/commerce-troubleshoot-deployer/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./packages/commerce-troubleshoot-deployer/package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} already exists for ${PACKAGE_NAME}; skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish deployer package
        if: steps.npm_check.outputs.should_publish == 'true'
        run: npm publish --workspace @coveops/commerce-troubleshoot-deployer --access public
